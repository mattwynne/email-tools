name: Collect stats

on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-reports:
    runs-on: ubuntu-latest
    env:
      FASTMAIL_API_TOKEN: ${{ secrets.FASTMAIL_API_TOKEN }}
      LOG_LEVEL: debug

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --version
      - run: npx tsc --build
      - run: npx ts-node src/count.ts
      - name: Commit updated stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stats.ndjson
          if git diff --cached --quiet; then
            echo "No stats changes to commit"
            exit 0
          fi
          git commit -m "Update stats for $(date +'%Y-%m-%d')"
          git push
