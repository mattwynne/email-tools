<!DOCTYPE html>

<body>
  <div>
    <canvas id="myChart"></canvas>
  </div>
</body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.3.0/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>

<script>
  const getStats = async () => {
    const response = await fetch("./data/stats.ndjson")
    const rows = (await response.text())
      .split("\n")
      .filter((row) => row.length > 0)
    return rows
      .map(JSON.parse)
      .map((stat) => ({ ...stat, date: new Date(stat.date) }))
  }

  const filterStats = (stats, daysToShow) => {
    const since = new Date(
      new Date().setDate(new Date().getDate() - daysToShow)
    )
    return stats.filter((stat) => stat.date > since)
  }

  const hasMailboxCounts = (stat) =>
    ["Inbox", "Feed", "Paperwork", "Screener"].every((name) =>
      stat.mailboxes.some((mailbox) => mailbox.name === name)
    )

  const chartData = (stats) =>
    stats.flatMap((stat, index) => {
      const previous = stats[index - 1]
      const points = []

      if (previous) {
        const daysSincePrevious =
          (stat.date.getTime() - previous.date.getTime()) / (24 * 60 * 60 * 1000)
        if (daysSincePrevious > 1.5) {
          points.push({
            x: new Date(previous.date.getTime() + 24 * 60 * 60 * 1000),
            y: null,
          })
        }
      }

      points.push({
        x: stat.date,
        y: hasMailboxCounts(stat) ? stat.totals.messages : null,
      })
      return points
    })

  const run = async () => {
    const daysToShow =
      new URLSearchParams(window.location.search).get("days") || 90
    const stats = filterStats(await getStats(), daysToShow)

    const ctx = document.getElementById("myChart")

    new Chart(ctx, {
      type: "line",
      data: {
        datasets: [
          {
            label: `total (over ${daysToShow} days)`,
            data: chartData(stats),
            spanGaps: false,
            borderWidth: 1,
          },
        ],
      },
      options: {
        scales: {
          x: {
            type: "time",
            time: {
              tooltipFormat: "DDDD",
              displayFormats: {
                day: "ccc, MMM d",
                month: "MMM yyyy",
              },
            },
            ticks: {
              source: "auto",
            },
          },
          y: {
            beginAtZero: true,
          },
        },
        plugins: {
          zoom: {
            pan: {
              enabled: true,
              mode: "x",
            },
            zoom: {
              wheel: {
                enabled: true,
              },
              pinch: {
                enabled: true,
              },
              mode: "x",
            },
          },
        },
      },
    })
  }
  run().catch(console.error)
</script>
